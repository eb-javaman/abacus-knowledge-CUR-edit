<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abacus · Ongoing Sites (Construction Management)</title>
<style>
  /* ---------- Design tokens (shared with cur.html) ---------- */
  :root{
    --white:#FFFFFF;
    --black:#000000;
    --indigo-50:#E5E4FB;
    --indigo-100:#C3C0F6;
    --indigo-200:#9791F1;
    --indigo-300:#736CED;
    --indigo-400:#5148EA;
    --indigo-500:#2F24E6;
    --indigo-600:#1D14C8;
    --indigo-700:#140A94;
    --indigo-800:#0D0765;
    --indigo-900:#07043C;
    --green-500:#28D435;
    --green-600:#1FAD29;
    --teal-500:#19B5A6;
    --gold-600:#A8821B;
    --orange-600:#D98A00;
    --purple-400:#8F88F0;

    --bg-app:#F6F5FD;
    --bg-side:#F1F0FC;
    --line:#E6E6EF;
    --line-strong:#D6D6E2;
    --text:#1B1B27;
    --text-soft:#5A5A6E;
    --text-mute:#8A8A9C;
    --radius:14px;
    --shadow-card:0 1px 2px rgba(16,16,40,.05);
    --font:"Inter","Helvetica Neue","Hiragino Sans","Yu Gothic UI",system-ui,-apple-system,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:var(--font);color:var(--text);background:var(--bg-app);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}

  /* ---------- App shell ---------- */
  .appbar{
    height:62px;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;background:var(--white);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:30;
  }
  .appbar .logo{font-size:24px;font-weight:800;letter-spacing:-.5px;}
  .appbar-actions{display:flex;align-items:center;gap:20px;}
  .appbar-actions svg{width:21px;height:21px;color:var(--text-soft);}

  .app{display:flex;min-height:calc(100vh - 62px);}

  .sidebar{
    width:236px;flex:0 0 236px;
    background:var(--bg-side);
    border-right:1px solid var(--line);
    padding:22px 16px;
  }
  .nav-group{margin-bottom:22px;}
  .nav-head{
    display:flex;align-items:center;gap:9px;
    color:var(--indigo-500);font-weight:700;font-size:15px;
    padding:6px 8px;
  }
  .nav-head svg{width:17px;height:17px;}
  .nav-item{
    display:block;padding:9px 12px 9px 30px;
    color:var(--text-soft);font-size:14px;border-radius:8px;
    text-decoration:none;line-height:1.35;cursor:pointer;
  }
  .nav-item:hover{background:#EAE9FA;}
  .nav-item.active{
    background:var(--indigo-300);color:var(--white);font-weight:700;
  }

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .content{padding:22px 26px 60px;}
  .page-title{font-size:17px;font-weight:600;color:var(--text);margin:0 0 18px;}

  /* ---------- Site cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;}
  @media(max-width:1100px){.cards{grid-template-columns:1fr;}}
  .site-card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow-card);min-width:0;
  }
  .site-card:hover{border:1px solid var(--indigo-100);}
  .sc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .sc-name{font-size:21px;font-weight:800;}
  .sc-meta{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--text-soft);white-space:nowrap;}
  .sc-meta .updated{display:inline-flex;align-items:center;gap:6px;}
  .sc-meta svg{width:14px;height:14px;}
  .status{font-weight:700;font-size:13px;}
  .status.syncing{color:var(--orange-600);}
  .status.auto{color:var(--indigo-500);}

  .metric{margin-bottom:12px;}
  .metric-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;}
  .metric-label{font-size:15px;font-weight:700;}
  .metric-label.dim{color:var(--text-mute);}
  .metric-label.dim b{color:var(--text);}
  .metric-side{font-size:12.5px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .track{height:7px;background:#E9E9F0;border-radius:999px;overflow:hidden;}
  .fill{height:100%;border-radius:999px;background:var(--green-500);}
  .fill.grad{background:linear-gradient(90deg,var(--green-500),var(--teal-500));}

  /* tabs + legend */
  .sc-tabs{display:flex;align-items:center;gap:4px;margin:16px 0 12px;flex-wrap:wrap;}
  .tab{
    background:none;border:none;font-size:14px;font-weight:600;color:var(--text-soft);
    padding:9px 14px;border-bottom:2.5px solid transparent;
  }
  .tab.active{
    background:var(--indigo-50);color:var(--text);font-weight:700;
    border-bottom-color:var(--indigo-500);
  }
  .legend{margin-left:auto;display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text);}
  .legend span{display:inline-flex;align-items:center;gap:7px;}
  .legend i{display:inline-block;width:18px;height:3px;border-radius:2px;}

  .chart{border:1px solid var(--line);border-radius:8px;padding:8px 6px 2px;}
  .chart svg{display:block;width:100%;height:auto;}

  .sc-foot{display:flex;gap:14px;margin-top:16px;}
  .sc-foot button{
    flex:1;display:inline-flex;align-items:center;justify-content:center;gap:4px;
    background:var(--white);border:1.5px solid var(--line-strong);border-radius:8px;
    padding:8px;font-size:14px;font-weight:600;color:var(--text);
  }
  .sc-foot button:hover{border-color:var(--indigo-300);color:var(--indigo-600);}
  .sc-foot svg{width:16px;height:16px;}
</style>
</head>
<body>
<!-- Full-width app header -->
<header class="appbar">
  <div class="logo">abacus</div>
  <div class="appbar-actions">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="nav-group">
      <div class="nav-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Sites
      </div>
      <a href="index.html" class="nav-item active">Ongoing Sites</a>
      <a href="PlanningSitelist.html" class="nav-item">Planning Sites</a>
    </div>
    <div class="nav-group">
      <div class="nav-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
        Knowledge
      </div>
      <a href="cur.html" class="nav-item">Construction Unit Rates</a>
      <a class="nav-item">Resource Unit Price</a>
      <a class="nav-item">Past Sites</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <main class="content">
      <h1 class="page-title">Ongoing Sites (Construction Management)</h1>
      <div class="cards" id="cards"></div>
    </main>
  </div>
</div>

<script>
const ICON = {
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  trend:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>',
  bars:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 20V10M12 20V4M19 20v-6"/><path d="M3 20h18"/></svg>'
};

/* ---------- chart builders (static prototype data) ---------- */
const MONTHS = ['25年1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function lineChart(){
  // plot area: x 56..780, y 18..196 (0% bottom .. 100% top)
  const xs = i => 56 + i * 62;
  const pts = {
    purple:[190,158,126,98,76,60,48,40],
    green: [190,162,136,110,90,78,71,70],
    gold:  [190,166,146,124,108,97,89,83]
  };
  const poly = (arr,color)=>`
    <polyline points="${arr.map((y,i)=>`${xs(i)},${y}`).join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>
    ${arr.map((y,i)=>`<circle cx="${xs(i)}" cy="${y}" r="3.4" fill="${color}"/>`).join('')}`;
  return `
  <svg viewBox="0 0 800 238" xmlns="http://www.w3.org/2000/svg">
    ${[196,107,18].map(y=>`<line x1="50" y1="${y}" x2="790" y2="${y}" stroke="#ECECF2" stroke-dasharray="${y===196?'none':'4 4'}"/>`).join('')}
    <text x="42" y="22" font-size="13" fill="#5A5A6E" text-anchor="end">100%</text>
    <text x="42" y="111" font-size="13" fill="#5A5A6E" text-anchor="end">50%</text>
    <text x="42" y="200" font-size="13" fill="#5A5A6E" text-anchor="end">0%</text>
    ${poly(pts.gold,'var(--gold-600)')}
    ${poly(pts.green,'var(--green-600)')}
    ${poly(pts.purple,'var(--purple-400)')}
    ${MONTHS.map((m,i)=>{
      const x = xs(i);
      if(m==='6月') return `<rect x="${x-22}" y="212" width="44" height="22" rx="11" fill="#E2E2EA"/><text x="${x}" y="227" font-size="13" fill="#1B1B27" text-anchor="middle">6月</text>`;
      return `<text x="${x}" y="227" font-size="13" fill="#5A5A6E" text-anchor="middle">${m}</text>`;
    }).join('')}
  </svg>`;
}

function barChart(){
  // 7 months, dual axis; plot area x 80..720, y 18..196
  const months = ['25年1月','2月','3月','4月','5月','6月','7月'];
  const xs = i => 110 + i * 100;
  const bars = [10,38,28,30,52,80,46]; // % heights; plus tall final bar
  const line = [128,118,110,104,98,92];
  return `
  <svg viewBox="0 0 800 238" xmlns="http://www.w3.org/2000/svg">
    ${[196,107,18].map(y=>`<line x1="72" y1="${y}" x2="728" y2="${y}" stroke="#ECECF2" stroke-dasharray="${y===196?'none':'4 4'}"/>`).join('')}
    <text x="64" y="22" font-size="13" fill="#5A5A6E" text-anchor="end">¥2000万</text>
    <text x="64" y="111" font-size="13" fill="#5A5A6E" text-anchor="end">¥1000万</text>
    <text x="64" y="200" font-size="13" fill="#5A5A6E" text-anchor="end">¥0</text>
    <text x="736" y="22" font-size="13" fill="#5A5A6E">¥500万</text>
    <text x="736" y="111" font-size="13" fill="#5A5A6E">¥250万</text>
    <text x="736" y="200" font-size="13" fill="#5A5A6E">¥0</text>
    <defs>
      <linearGradient id="barG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#9A9DA8"/><stop offset="1" stop-color="#C9CBD3"/>
      </linearGradient>
    </defs>
    ${bars.map((h,i)=>{
      const bh = h*1.78, x = xs(i)-17;
      return `<rect x="${x}" y="${196-bh}" width="34" height="${bh}" fill="url(#barG)"/>`;
    }).join('')}
    <rect x="${xs(5)+33}" y="${196-140}" width="34" height="140" fill="url(#barG)"/>
    <polyline points="${line.map((y,i)=>`${xs(i)},${y}`).join(' ')}" fill="none" stroke="var(--purple-400)" stroke-width="2.5"/>
    ${line.map((y,i)=>`<circle cx="${xs(i)}" cy="${y}" r="3.4" fill="var(--purple-400)"/>`).join('')}
    ${months.map((m,i)=>{
      const x = xs(i);
      if(m==='6月') return `<rect x="${x-22}" y="212" width="44" height="22" rx="11" fill="#1B1B27"/><text x="${x}" y="227" font-size="13" fill="#fff" text-anchor="middle">6月</text>`;
      return `<text x="${x}" y="227" font-size="13" fill="#5A5A6E" text-anchor="middle">${m}</text>`;
    }).join('')}
  </svg>`;
}

/* ---------- card template ---------- */
function siteCard(cfg){
  const legendFull = `
    <div class="legend">
      <span>Start <i style="background:var(--green-600)"></i></span>
      <span>Elapsed Time <i style="background:var(--purple-400)"></i></span>
      ${cfg.chart==='line' ? '<span>Total Spending <i style="background:var(--gold-600)"></i></span>' : ''}
    </div>`;
  return `
  <div class="site-card">
    <div class="sc-head">
      <div class="sc-name">Site Name</div>
      <div class="sc-meta">
        <span class="updated">${ICON.clock} Last synced: 00:00 mm/dd/yyyy</span>
      </div>
    </div>

    <div class="metric">
      <div class="metric-row">
        <span class="metric-label ${cfg.dimStart?'dim':''}">${cfg.jp?'着手率':'Start Rate'}: <b>50%</b></span>
      </div>
      <div class="track"><div class="fill" style="width:50%"></div></div>
    </div>
    <div class="metric">
      <div class="metric-row">
        <span class="metric-label">${cfg.jp?'時間経過率':'Time Elapsed Rate'}: <b>60%</b></span>
        <span class="metric-side">Construction Period: 2025/10/01-2026/0930</span>
      </div>
      <div class="track"><div class="fill" style="width:60%"></div></div>
    </div>
    <div class="metric">
      <div class="metric-row">
        <span class="metric-label">Total Expenditure Rate: <b>75%</b></span>
        <span class="metric-side">Estimated Amount: $128,940&ensp;Expenditure Amount: $128,940</span>
      </div>
      <div class="track"><div class="fill grad" style="width:75%"></div></div>
    </div>

    <div class="sc-tabs">
      <button class="tab ${cfg.chart==='line'?'active':''}" data-tab="line">Construction Progress</button>
      <button class="tab ${cfg.chart==='bar'?'active':''}" data-tab="bar">Expenditure</button>
      ${legendFull}
    </div>

    <div class="chart">${cfg.chart==='line' ? lineChart() : barChart()}</div>

    <div class="sc-foot">
      <button>${ICON.trend} Actuals (Overall)</button>
      <button>${ICON.cal} Actuals (Daily)</button>
      <button>${ICON.bars} Actuals (Summary)</button>
    </div>
  </div>`;
}

const CARDS = [
  {status:'Syncing',        chart:'line', jp:false},
  {status:'Auto Acquiring', chart:'bar',  jp:true},
  {status:'Syncing',        chart:'line', jp:false, dimStart:true},
  {status:'Auto Acquiring', chart:'line', jp:false}
];

const wrap = document.getElementById('cards');
wrap.innerHTML = CARDS.map(siteCard).join('');

// tab switching swaps the chart inside the same card
wrap.addEventListener('click',e=>{
  const tab = e.target.closest('.tab');
  if(!tab) return;
  const card = tab.closest('.site-card');
  card.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===tab));
  card.querySelector('.chart').innerHTML = tab.dataset.tab==='bar' ? barChart() : lineChart();
});
</script>
</body>
</html>
