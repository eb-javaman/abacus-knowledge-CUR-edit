<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abacus · Planning Sites (Estimation Management)</title>
<style>
  /* ---------- Design tokens (shared with cur.html) ---------- */
  :root{
    --white:#FFFFFF;
    --black:#000000;
    --indigo-50:#E5E4FB;
    --indigo-100:#C3C0F6;
    --indigo-200:#9791F1;
    --indigo-300:#736CED;
    --indigo-400:#5148EA;
    --indigo-500:#2F24E6;
    --indigo-600:#1D14C8;
    --indigo-700:#140A94;
    --indigo-800:#0D0765;
    --indigo-900:#07043C;

    --bg-app:#F6F5FD;
    --bg-side:#F1F0FC;
    --line:#E6E6EF;
    --line-strong:#D6D6E2;
    --text:#1B1B27;
    --text-soft:#5A5A6E;
    --text-mute:#8A8A9C;
    --row-alt:#F4F4F8;
    --radius:12px;
    --font:"Inter","Helvetica Neue","Hiragino Sans","Yu Gothic UI",system-ui,-apple-system,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:var(--font);color:var(--text);background:var(--bg-app);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}

  /* ---------- App shell ---------- */
  .appbar{
    height:62px;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;background:var(--white);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:30;
  }
  .appbar .logo a{text-decoration: none;color: var(--indigo-500);}
  .appbar .logo{font-size:24px;font-weight:800;letter-spacing:-.5px;}
  .appbar-actions{display:flex;align-items:center;gap:20px;}
  .appbar-actions svg{width:21px;height:21px;color:var(--text-soft);}

  .app{display:flex;min-height:calc(100vh - 62px);}

  .sidebar{
    width:236px;flex:0 0 236px;
    background:var(--bg-side);
    border-right:1px solid var(--line);
    padding:22px 16px;
  }
  .nav-group{margin-bottom:22px;}
  .nav-head{
    display:flex;align-items:center;gap:9px;
    color:var(--indigo-500);font-weight:700;font-size:15px;
    padding:6px 8px;
  }
  .nav-head svg{width:17px;height:17px;}
  .nav-item{
    display:block;padding:9px 12px 9px 30px;
    color:var(--text-soft);font-size:14px;border-radius:9px;
    text-decoration:none;line-height:1.35;cursor:pointer;
  }
  .nav-item:hover{background:#EAE9FA;}
  .nav-item.active{
    background:var(--indigo-300);color:var(--white);font-weight:700;
  }

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .content{padding:26px 30px 60px;background:var(--white);margin:0;flex:1;}

  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
  .page-title{font-size:19px;font-weight:600;color:var(--text);margin:0;}
  .btn-register{
    background:var(--white);border:1.5px solid var(--text);border-radius:8px;
    padding:8px 16px;font-size:15px;font-weight:600;color:var(--text);
    display:inline-flex;align-items:center;gap:10px;
  }
  .btn-register:hover{background:#F6F6FA;}

  /* ---------- Table ---------- */
  .tbl{width:100%;}
  .tbl-head,.tbl-row{
    display:grid;
    grid-template-columns:minmax(0,1.35fr) minmax(0,1.55fr) minmax(130px,.8fr) minmax(95px,.55fr) 215px;
    align-items:center;gap:24px;
  }
  .tbl-head{
    padding:8px 16px;border-bottom:1px solid var(--line);
    font-size:14px;font-weight:600;color:var(--text);
  }
  .tbl-row{padding:8px 12px;}
  .tbl-row:nth-child(even){background:var(--row-alt);}
  /* newly registered site — highlighted until first opened */
  .tbl-row.is-new{background:var(--indigo-50);}

  /* status badges next to the site name */
  .badge{
    display:inline-flex;align-items:center;flex:0 0 auto;
    font-size:10px;font-weight:700;letter-spacing:.3px;
    border-radius:999px;padding:3px 9px;white-space:nowrap;
  }
  .badge-new{background:var(--white);color:var(--indigo-600);border:1px solid var(--indigo-200);}
  .badge-progress{background:#FFF4DC;color:#8A6400;border:1px solid #F0DCA8;}
  .badge-final{background:#EAFBEB;color:#167E1E;border:1px solid #BFEFC4;}

  /* empty list state */
  .empty-rows{
    padding:54px 16px;text-align:center;
    font-size:14px;color:var(--text-mute);line-height:1.6;
  }
  .empty-rows b{color:var(--text-soft);}

  .site-cell{display:flex;align-items:center;gap:14px;min-width:0;}
  .site-name{
    flex:1;min-width:0;font-weight:700;font-size:14px;line-height:1.3;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  }
  .last-edited{
    display:flex;flex-direction:column;gap:2px;flex:0 0 auto;
    font-size:12px;color:var(--text-soft);white-space:nowrap;
  }
  .last-edited .le-label{display:inline-flex;align-items:center;gap:6px;}
  .last-edited svg{width:14px;height:14px;flex:0 0 auto;}
  .last-edited .le-time{font-weight:700;padding-left:20px;}

  /* Announcement + Bid Date grouped in one column */
  .date-group{display:flex;align-items:center;gap:18px;min-width:0;}
  .date-pair{display:flex;    align-items: flex-start; gap: 2px; flex: 1; min-width: 0; flex-direction: column;}
  .date-label{font-size:12px;color:var(--text-soft);white-space:nowrap;}
  .date-input{
    width:100%;max-width:118px;min-width:78px;
    border:1.5px solid var(--line-strong);border-radius:8px;
    padding:8px;font-size:12px;color:var(--text);background:var(--white);font-family:inherit;
  }
  .date-input:focus{outline:none;border-color:var(--indigo-400);box-shadow:0 0 0 3px rgba(81,72,234,.14);}
  .date-input:disabled,.date-input.muted{background:#EFEFF3;border-color:#E2E2EA;color:var(--text-mute);}
  .date-input::placeholder{color:var(--text-mute);}

  .amount-cell{position:relative;}
  .amount-input{
    width:100%;border:1.5px solid var(--line-strong);border-radius:8px;
    padding:8px;font-size:14px;font-weight:700;color:var(--text);
    background:var(--white);font-family:inherit;
  }
  .amount-input:focus{outline:none;border-color:var(--indigo-400);box-shadow:0 0 0 3px rgba(81,72,234,.14);}
  .amount-input::placeholder{color:var(--text-mute);font-weight:400;}
  .amount-clear{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--text-mute);padding:3px;display:flex;border-radius:50%;
  }
  .amount-clear:hover{color:var(--text);background:#EEE;}
  .amount-clear svg{width:15px;height:15px;}

  .exec-cell{font-size:14px;font-weight:700;text-align:left;}

  /* floating tooltip for truncated site names */
  .tooltip{
    position:fixed;z-index:100;pointer-events:none;
    background:#1B1B27;color:#fff;padding:8px 12px;border-radius:8px;
    font-size:13px;font-weight:600;line-height:1.4;max-width:340px;
    box-shadow:0 8px 24px rgba(7,4,60,.25);
    opacity:0;visibility:hidden;transition:opacity .12s ease;
  }
  .tooltip.show{opacity:1;visibility:visible;}
  .tooltip::after{
    content:"";position:absolute;top:100%;left:18px;
    border:6px solid transparent;border-top-color:#1B1B27;
  }

  .actions-cell{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
  .btn-planning{
    background:var(--indigo-500);color:#fff;border:none;border-radius:8px;
    padding:9px 22px;font-size:14px;font-weight:600;
  }
  .btn-planning:hover{background:var(--indigo-600);}
  .btn-bidresult{
    background:var(--white);color:var(--text-mute);border:1.5px solid var(--line-strong);
    border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:not-allowed;
  }
</style>
</head>
<body>
<!-- Full-width app header -->
<header class="appbar">
  <div class="logo"><a href="index.html">abacus</a></div>
  <div class="appbar-actions">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="nav-group">
      <div class="nav-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Sites
      </div>
      <a href="index.html" class="nav-item">Ongoing Sites</a>
      <a href="PlanningSitelist.html" class="nav-item active">Planning Sites</a>
    </div>
    <div class="nav-group">
      <div class="nav-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
        Knowledge
      </div>
      <a href="cur.html" class="nav-item">Construction Unit Rates</a>
      <a class="nav-item">Resource Unit Rates</a>
      <a class="nav-item">Past Price</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <main class="content">
      <div class="page-head">
        <h1 class="page-title">Planning Sites (Estimation Management)</h1>
        <button class="btn-register">Register site for Quotation
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <div class="tbl">
        <div class="tbl-head">
          <div>Site name</div>
          <div>Date</div>
          <div>Estimated<br>Amount</div>
          <div>Execution Amount</div>
          <div></div>
        </div>
        <div id="rows"></div>
      </div>
    </main>
  </div>
</div>

<script>
const SVG = {
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>'
};

/* Row variants matching the design:
   dates: 'filled' | 'filled-muted' | 'empty' | 'empty-muted'
   est:   'input-filled' | 'input-empty' */
/* ---- persisted site list (localStorage: abacus.sites) ----
   No demo seeds: the list starts empty and users begin by
   registering a site. On load, stale entries (no saved planning
   state and not user-registered) are cleaned out. */
const SITES_KEY = 'abacus.sites';
function hasPlanState(id){ return !!localStorage.getItem('abacus.planning.' + id); }
/* Acquire Performance Data finalizes the plan — the site leaves this page.
   (It stays in abacus.sites: it will surface on Ongoing Sites later.) */
function isFinalized(id){
  try{
    const snap = JSON.parse(localStorage.getItem('abacus.planning.' + id) || 'null');
    return !!(snap && snap.acquired);
  }catch(_e){ return false; }
}
function loadSites(){
  let list = [];
  try{ list = JSON.parse(localStorage.getItem(SITES_KEY) || '[]'); }catch(_e){ list = []; }
  const cleaned = list.filter(s => s.status === 'new' || s.createdAt || hasPlanState(s.id));
  if(cleaned.length !== list.length) saveSites(cleaned);
  return cleaned;
}
function saveSites(list){
  try{ localStorage.setItem(SITES_KEY, JSON.stringify(list)); }catch(_e){}
}
let sites = loadSites();

/* badge from planning persistence: NEW → In Progress → Finalized */
function siteBadge(site){
  if(site.status === 'new') return '<span class="badge badge-new">NEW</span>';
  try{
    const snap = JSON.parse(localStorage.getItem('abacus.planning.' + site.id) || 'null');
    if(snap) return snap.acquired
      ? '<span class="badge badge-final">Finalized</span>'
      : '<span class="badge badge-progress">In Progress</span>';
  }catch(_e){}
  return '';
}

function dateInput(variant){
  const muted = variant.includes('muted') ? ' muted' : '';
  const value = variant.startsWith('filled') ? 'value="2025/00/00"' : 'placeholder="---"';
  return `<input class="date-input${muted}" ${value} ${muted ? 'disabled' : ''} />`;
}

function estCell(variant){
  if(variant === 'input-empty'){
    return `
      <div class="amount-cell">
        <input class="amount-input" placeholder="$" />
        <button class="amount-clear">${SVG.x}</button>
      </div>`;
  }
  return `
    <div class="amount-cell">
      <input class="amount-input" value="$128,940" />
    </div>`;
}

function renderRows(){
  // finalized sites (Acquire pressed) no longer belong on this page
  const visible = sites.filter(s => !isFinalized(s.id));
  if(!visible.length){
    document.getElementById('rows').innerHTML = `
      <div class="empty-rows">
        No sites yet — click <b>Register site for Quotation</b> to get started.
      </div>`;
    return;
  }
  document.getElementById('rows').innerHTML = visible.map(r=>`
    <div class="tbl-row ${r.status==='new' ? 'is-new' : ''}">
      <div class="site-cell">
        <span class="site-name">${r.name}</span>
        ${siteBadge(r)}
        <span class="last-edited">
          <span class="le-label">${SVG.clock} Last Edited:</span>
          <span class="le-time">00:00 mm/dd/yyyy</span>
        </span>
      </div>
      <div class="date-group">
        <span class="date-pair">
          <span class="date-label">Announcement</span>
          ${dateInput(r.dates)}
        </span>
        <span class="date-pair">
          <span class="date-label">Bid Date</span>
          ${dateInput(r.dates)}
        </span>
      </div>
      ${estCell(r.est)}
      <div class="exec-cell">$128,940</div>
      <div class="actions-cell">
        <button class="btn-planning" data-id="${r.id}">Planning</button>
        <button class="btn-bidresult">Bid Result</button>
      </div>
    </div>`).join('');

  // clear button empties its sibling input
  document.querySelectorAll('.amount-clear').forEach(b=>{
    b.addEventListener('click',()=>{ const i=b.parentElement.querySelector('input'); i.value=''; i.focus(); });
  });

  // [Planning] → open the editor for THIS site; first open clears the NEW flag
  document.querySelectorAll('.btn-planning').forEach(b=>{
    b.addEventListener('click',()=>{
      const id = b.dataset.id;
      localStorage.setItem('abacus.currentSiteId', id); // fallback for pages without the URL param
      sites = sites.map(s => s.id === id ? { ...s, status: undefined } : s); // drop 'new' after first open
      saveSites(sites);
      location.href = 'planning.html?siteId=' + encodeURIComponent(id);
    });
  });

  bindNameTooltips();
}

// [Register Site for Quotation] → append a highlighted NEW site
document.querySelector('.btn-register').addEventListener('click',()=>{
  sites = [...sites, {
    id: 'site-' + Date.now(),
    name: 'Site Name',
    dates: 'filled-muted',
    est: 'input-filled',
    status: 'new',
    createdAt: Date.now()
  }];
  saveSites(sites);
  renderRows();
});

// tooltip: show full site name on hover, only when the text is truncated
const tip = document.createElement('div');
tip.className = 'tooltip';
document.body.appendChild(tip);

function bindNameTooltips(){
  document.querySelectorAll('.site-name').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      if(el.scrollHeight <= el.clientHeight + 1) return; // fully visible — no tooltip
      tip.textContent = el.textContent.trim();
      tip.classList.add('show');
      const r = el.getBoundingClientRect();
      tip.style.left = r.left + 'px';
      tip.style.top = '0px'; // place first so height is measurable
      tip.style.top = (r.top - tip.offsetHeight - 10) + 'px';
    });
    el.addEventListener('mouseleave',()=>tip.classList.remove('show'));
  });
}

renderRows();
</script>
</body>
</html>
