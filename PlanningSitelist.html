<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abacus · Planning Sites (Estimation Management)</title>
<style>
  /* ---------- Design tokens (shared with cur.html) ---------- */
  :root{
    --white:#FFFFFF;
    --black:#000000;
    --indigo-50:#E5E4FB;
    --indigo-100:#C3C0F6;
    --indigo-200:#9791F1;
    --indigo-300:#736CED;
    --indigo-400:#5148EA;
    --indigo-500:#2F24E6;
    --indigo-600:#1D14C8;
    --indigo-700:#140A94;
    --indigo-800:#0D0765;
    --indigo-900:#07043C;

    --bg-app:#F6F5FD;
    --bg-side:#F1F0FC;
    --line:#E6E6EF;
    --line-strong:#D6D6E2;
    --text:#1B1B27;
    --text-soft:#5A5A6E;
    --text-mute:#8A8A9C;
    --row-alt:#F4F4F8;
    --radius:12px;
    --font:"Inter","Helvetica Neue","Hiragino Sans","Yu Gothic UI",system-ui,-apple-system,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:var(--font);color:var(--text);background:var(--bg-app);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}

  /* ---------- App shell ---------- */
  .appbar{
    height:62px;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;background:var(--white);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:30;
  }
  .appbar .logo{font-size:24px;font-weight:800;letter-spacing:-.5px;}
  .appbar-actions{display:flex;align-items:center;gap:20px;}
  .appbar-actions svg{width:21px;height:21px;color:var(--text-soft);}

  .app{display:flex;min-height:calc(100vh - 62px);}

  .sidebar{
    width:236px;flex:0 0 236px;
    background:var(--bg-side);
    border-right:1px solid var(--line);
    padding:22px 16px;
  }
  .nav-group{margin-bottom:22px;}
  .nav-head{
    display:flex;align-items:center;gap:9px;
    color:var(--indigo-500);font-weight:700;font-size:15px;
    padding:6px 8px;
  }
  .nav-head svg{width:17px;height:17px;}
  .nav-item{
    display:block;padding:9px 12px 9px 30px;
    color:var(--text-soft);font-size:14px;border-radius:9px;
    text-decoration:none;line-height:1.35;cursor:pointer;
  }
  .nav-item:hover{background:#EAE9FA;}
  .nav-item.active{
    background:var(--indigo-300);color:var(--white);font-weight:700;
  }

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .content{padding:26px 30px 60px;background:var(--white);margin:0;flex:1;}

  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
  .page-title{font-size:19px;font-weight:600;color:var(--text);margin:0;}
  .btn-register{
    background:var(--white);border:1.5px solid var(--text);border-radius:8px;
    padding:8px 16px;font-size:15px;font-weight:600;color:var(--text);
    display:inline-flex;align-items:center;gap:10px;
  }
  .btn-register:hover{background:#F6F6FA;}

  /* ---------- Table ---------- */
  .tbl{width:100%;}
  .tbl-head,.tbl-row{
    display:grid;
    grid-template-columns:minmax(0,1.5fr) minmax(0,1.05fr) minmax(0,1.05fr) minmax(130px,.85fr) minmax(95px,.6fr) minmax(185px,auto);
    align-items:center;gap:12px;
  }
  .tbl-head{
    padding:8px 16px;border-bottom:1px solid var(--line);
    font-size:14px;font-weight:600;color:var(--text);
  }
  .tbl-head .h-date{grid-column:2 / span 2;text-align:left;}
  .tbl-row{padding:12px 16px;}
  .tbl-row:nth-child(even){background:var(--row-alt);}

  .site-cell{display:flex;align-items:center;gap:18px;min-width:0;}
  .site-name{font-weight:700;font-size:15px;white-space:nowrap;}
  .last-edited{
    display:inline-flex;align-items:center;gap:6px;
    font-size:13px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .last-edited svg{width:14px;height:14px;flex:0 0 auto;}

  .date-cell{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
  .date-label{font-size:13px;color:var(--text-soft);white-space:nowrap;}
  .date-input{
    width:100%;max-width:118px;min-width:78px;
    border:1.5px solid var(--line-strong);border-radius:8px;
    padding:8px;font-size:13px;color:var(--text);background:var(--white);font-family:inherit;
  }
  .date-input:focus{outline:none;border-color:var(--indigo-400);box-shadow:0 0 0 3px rgba(81,72,234,.14);}
  .date-input:disabled,.date-input.muted{background:#EFEFF3;border-color:#E2E2EA;color:var(--text-mute);}
  .date-input::placeholder{color:var(--text-mute);}

  .amount-cell{position:relative;}
  .amount-input{
    width:100%;border:1.5px solid var(--line-strong);border-radius:8px;
    padding:8px;font-size:14px;font-weight:700;color:var(--text);
    background:var(--white);font-family:inherit;
  }
  .amount-input:focus{outline:none;border-color:var(--indigo-400);box-shadow:0 0 0 3px rgba(81,72,234,.14);}
  .amount-input::placeholder{color:var(--text-mute);font-weight:400;}
  .amount-clear{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--text-mute);padding:3px;display:flex;border-radius:50%;
  }
  .amount-clear:hover{color:var(--text);background:#EEE;}
  .amount-clear svg{width:15px;height:15px;}

  .exec-cell{font-size:15px;font-weight:700;text-align:center;}

  .actions-cell{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
  .btn-planning{
    background:var(--indigo-500);color:#fff;border:none;border-radius:8px;
    padding:9px 22px;font-size:14px;font-weight:600;
  }
  .btn-planning:hover{background:var(--indigo-600);}
  .btn-bidresult{
    background:var(--white);color:var(--text-mute);border:1.5px solid var(--line-strong);
    border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:not-allowed;
  }
</style>
</head>
<body>
<!-- Full-width app header -->
<header class="appbar">
  <div class="logo">abacus</div>
  <div class="appbar-actions">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="nav-group">
      <div class="nav-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Sites
      </div>
      <a href="index.html" class="nav-item">Ongoing Sites</a>
      <a href="PlanningSitelist.html" class="nav-item active">Planning Sites</a>
    </div>
    <div class="nav-group">
      <div class="nav-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
        Knowledge
      </div>
      <a href="cur.html" class="nav-item">Construction Unit Rates</a>
      <a class="nav-item">Resource Unit Rates</a>
      <a class="nav-item">Past Price</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <main class="content">
      <div class="page-head">
        <h1 class="page-title">Planning Sites (Estimation Management)</h1>
        <button class="btn-register">Register site for Quotation
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <div class="tbl">
        <div class="tbl-head">
          <div>Site name</div>
          <div class="h-date">Date</div>
          <div style="grid-column:4;text-align:center;">Estimated Amount</div>
          <div style="grid-column:5;text-align:center;">Execution Amount</div>
          <div></div>
        </div>
        <div id="rows"></div>
      </div>
    </main>
  </div>
</div>

<script>
const SVG = {
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>'
};

/* Row variants matching the design:
   dates: 'filled' | 'filled-muted' | 'empty' | 'empty-muted'
   est:   'input-filled' | 'input-empty' */
const ROWS = [
  {dates:'filled',       est:'input-empty'},
  {dates:'filled-muted', est:'input-filled'},
  {dates:'filled',       est:'input-filled'},
  {dates:'empty-muted',  est:'input-filled'},
  {dates:'empty',        est:'input-filled'},
  {dates:'filled-muted', est:'input-filled'},
  {dates:'empty',        est:'input-filled'},
  {dates:'empty-muted',  est:'input-filled'},
  {dates:'filled',       est:'input-filled'},
  {dates:'filled-muted', est:'input-filled'},
  {dates:'empty',        est:'input-empty'},
  {dates:'empty-muted',  est:'input-filled'}
];

function dateInput(variant){
  const muted = variant.includes('muted') ? ' muted' : '';
  const value = variant.startsWith('filled') ? 'value="2025/00/00"' : 'placeholder="---"';
  return `<input class="date-input${muted}" ${value} ${muted ? 'disabled' : ''} />`;
}

function estCell(variant){
  if(variant === 'input-empty'){
    return `
      <div class="amount-cell">
        <input class="amount-input" placeholder="$" />
        <button class="amount-clear">${SVG.x}</button>
      </div>`;
  }
  return `
    <div class="amount-cell">
      <input class="amount-input" value="$128,940" />
    </div>`;
}

document.getElementById('rows').innerHTML = ROWS.map(r=>`
  <div class="tbl-row">
    <div class="site-cell">
      <span class="site-name">Site Name</span>
      <span class="last-edited">${SVG.clock} Last Edited: mm/dd/yyyy 00:00</span>
    </div>
    <div class="date-cell">
      <span class="date-label">Announcement</span>
      ${dateInput(r.dates)}
    </div>
    <div class="date-cell">
      <span class="date-label">Bid Date</span>
      ${dateInput(r.dates)}
    </div>
    ${estCell(r.est)}
    <div class="exec-cell">$128,940</div>
    <div class="actions-cell">
      <button class="btn-planning">Planning</button>
      <button class="btn-bidresult">Bid Result</button>
    </div>
  </div>`).join('');

// clear button empties its sibling input
document.querySelectorAll('.amount-clear').forEach(b=>{
  b.addEventListener('click',()=>{ const i=b.parentElement.querySelector('input'); i.value=''; i.focus(); });
});

// Planning button opens the execution planning page
document.querySelectorAll('.btn-planning').forEach(b=>{
  b.addEventListener('click',()=>{ location.href='planning.html'; });
});
</script>
</body>
</html>
